# Canonical pharos config. Drop a copy at:
#
#   ~/.config/pharos/pharos.toml      (global)
# or
#   ./.pharos.toml                    (project; walked up from cwd)
#
# Either is fully optional — pharos boots cleanly with no config file
# at all. Project-level overrides global; environment variables
# (`PHAROS_*`) override both.
#
# Every key here is at its compiled-in default. Delete keys you do
# not want to override; uncomment and edit the rest.
#
# Bootstrap recipe:
#   pharos --print-default-config > ~/.config/pharos/pharos.toml

# transport — "stdio" | "http" | "both". Most MCP hosts spawn pharos
# as a subprocess and speak stdio.
# transport = "stdio"

# tools — choose which MCP tools the LLM sees.
#
# Each entry is either a category alias (expands to a set) or a
# specific tool name. Mix freely. Default exposes everything.
#
#   "read"  — non-mutating LSP queries (17 tools):
#     hover, goto_definition, goto_type_definition,
#     goto_implementation, find_references, document_symbols,
#     workspace_symbols, signature_help,
#     call_hierarchy_prepare, call_hierarchy_incoming_calls,
#     call_hierarchy_outgoing_calls, get_diagnostics,
#     inlay_hints, semantic_tokens,
#     type_hierarchy_prepare, type_hierarchy_supertypes,
#     type_hierarchy_subtypes
#
#   "write" — edit-producing LSP tools (4 tools). The first three
#             return WorkspaceEdit data; apply_workspace_edit writes
#             a WorkspaceEdit to disk on demand (dry_run=true default):
#     rename_preview, format_document, code_actions,
#     apply_workspace_edit
#
#   "debug" — pharos runtime introspection (15 tools incl. echo):
#     echo, runtime_processes, runtime_supervision_tree,
#     runtime_ets_tables, runtime_memory, runtime_applications,
#     runtime_scheduler_util, runtime_pid_info,
#     runtime_log_tail, runtime_log_clear, runtime_log_level,
#     runtime_trace_lsp, runtime_trace_calls, runtime_kill_lsp,
#     runtime_language_config
#
#   "raw"   — power-user escape hatch (1 tool):
#     lsp_request_raw
#
# Examples:
#   tools = ["read"]                       # query-only agent
#   tools = ["read", "write"]              # full LSP surface
#   tools = ["read", "runtime_log_tail"]   # category + one extra
#   tools = ["hover", "goto_definition"]   # fully explicit
# tools = ["read", "write", "debug", "raw"]

[server.http]
# port — 0 lets the OS pick a free port. Pharos logs the bound
# port to stderr (and writes it to port_file if set).
# port = 3535

# bind — interface to bind on. Localhost-only by default.
# bind = "127.0.0.1"

# port_file — atomic write+rename of the bound port to a path.
# Headless callers read this file to discover where pharos landed.
# port_file = "~/.cache/pharos/http-port"

[log]
# filter — RUST_LOG-style spec. "info" by default; per-target
# overrides override the default level for matching prefixes.
#   PHAROS_LOG=info,pharos/lsp/proc=debug,pharos/lsp/trace=off
# filter = "info"

# file — append-only log file path. Unset (the default) disables the
# file sink.
# file = "~/.cache/pharos/log/pharos.log"

# ring — keep an in-memory ring buffer feeding runtime_log_tail.
# ring = true

# stderr — also fan out to stderr. Required for foreground
# debugging; safe to disable when the file sink is set.
# stderr = true

[lsp]
# trace — convenience flag for turning on the wire tracer at debug
# level. Equivalent to a filter override
# `pharos/lsp/trace=debug`.
# trace = false

[runtime]
# trace_calls_enabled — gates the runtime_trace_calls MCP tool
# (recon-backed). Off by default because raw module/function
# tracing has scheduler side effects.
# trace_calls_enabled = false

# [bridge]
# port — VSCode bridge listener port for the M7 extension.
# port = 31337

# [languages.<id>] — per-language overrides. Two override shapes
# are accepted; mix freely.
#
# 1) Flat shape (legacy + simplest). Patches the primary (first)
# server of the language. Convenient for swapping a single binary
# path.
#
# [languages.rust]
# command = "/opt/custom/rust-analyzer-nightly"
#
# [languages.python]
# command = "pyright-langserver"   # patches python's primary server
# args = ["--stdio"]
#
# 2) Per-server array of tables. Required when the override should
# target a non-primary server (ruff in python, hypothetical eslint
# in typescript) or when adding a third server alongside the
# bundled defaults. Each entry merges into the default by `id`,
# or appends as a new server when the id is absent.
#
# [[languages.python.servers]]
# id = "ruff"
# command = "/custom/path/to/ruff"   # patch ruff's command
#
# [[languages.python.servers]]
# id = "mypy"                        # add a third server
# command = "mypy"
# args = ["--strict"]
# methods = ["textDocument/diagnostic"]   # Only-scope
#
# Adding a brand-new language requires command + file_extensions
# at minimum:
#
# [languages.haskell]
# command = "haskell-language-server-wrapper"
# args = ["--lsp"]
# file_extensions = [".hs"]
# root_markers = ["cabal.project", "stack.yaml"]
# diagnostics_mode = "push"
#
# 3) JSON-string overrides for the deep-nested fields.
#
# `initialization_options_json` and `workspace_configuration_json`
# replace whole blobs (no deep-merge — predictable, simple). LSP
# vendor docs publish init options as JSON, so paste from upstream
# verbatim. Wrapped in TOML triple-quoted strings.
#
# To see the bundled default before overriding, run:
#
#     pharos --print-language-config rust
#
# (or call the `runtime_language_config` MCP tool from inside Claude
# Code). The output is paste-ready: copy the full block, edit the
# fields you want changed, save back into pharos.toml.
#
# Example: turn off rust-analyzer's `checkOnSave` (Cargo `cargo check`
# on every save runs slow on big workspaces).
#
# [languages.rust]
# initialization_options_json = '''
# {
#   "checkOnSave": false,
#   "check": {"command": "check"},
#   "procMacro": {"enable": true}
# }
# '''
#
# Same shape works per-sub-server when the language has multiple:
#
# [[languages.python.servers]]
# id = "pyright"
# initialization_options_json = '''
# {"reportMissingImports": "warning"}
# '''
#
# Workspace-configuration is the response pharos sends when an LSP
# pulls `workspace/configuration` (typescript-language-server is the
# primary user). Top level MUST be a JSON object whose keys are the
# section names the server queries:
#
# [languages.typescript]
# workspace_configuration_json = '''
# {
#   "typescript": {
#     "preferences": {"importModuleSpecifier": "shortest"},
#     "format": {"enable": false}
#   },
#   "javascript": {
#     "preferences": {"importModuleSpecifier": "shortest"}
#   }
# }
# '''
#
# Parse failures log a warning and fall back to the bundled default,
# so a typo in the override does not crash boot.
#
# 4) Per-server timeout overrides (M12 polish).
#
# `readiness_timeout_ms` (post-handshake / post-didOpen indexing-drain
# budget) and `initialize_timeout_ms` (LSP `initialize` handshake
# budget) are per-ServerConfig now. Defaults are 30s and 90s
# respectively. Override when a workspace is large enough that cold
# rust-analyzer / jdtls / elp blows past the bundled budgets:
#
# [languages.rust]
# readiness_timeout_ms = 60000      # bigger budget for the post-didOpen drain
#
# [[languages.java.servers]]
# id = "jdtls"
# initialize_timeout_ms = 180000    # 3 minutes — for very large multi-module
#                                   # gradle / maven projects
#
# Both fields work in flat (`[languages.<id>]` patches the primary
# server) and per-server (`[[languages.<id>.servers]]`) shapes.

# 5) Per-tool default_timeout_ms (M13 polish, ADR 021).
#
# Every LSP-bound MCP tool accepts an optional `timeout_ms` arg, and
# the per-tool default that applies when the LLM doesn't pass one is
# tunable here. Resolution order (later wins):
#   1. Compile-time default (each tool ships with one — see source)
#   2. [tool_config.<name>] default_timeout_ms
#   3. [tool_config.<name>.<lang>] default_timeout_ms (per-lang)
#   4. Per-call `timeout_ms` argument
#   5. Session override via `runtime_set_tool_timeout` MCP tool
#      (Phase 2; takes precedence over layers 1-3, beaten only by
#      per-call layer 4)
#
# Global per-tool example:
#
# [tool_config.format_document]
# default_timeout_ms = 90000
#
# [tool_config.find_references]
# default_timeout_ms = 120000
#
# Per-tool x per-language example. Useful when one heavy LSP needs
# headroom but global bumps would waste time on faster LSPs:
#
# [tool_config.find_references.java]
# default_timeout_ms = 120000   # jdtls workspace-wide refs are slow
#
# [tool_config.workspace_symbols.go]
# default_timeout_ms = 90000    # gopls fuzzy-match across stdlib
#
# [tool_config.format_document.rust]
# default_timeout_ms = 60000    # rustfmt cold cache on a monorepo
#
# Recommended starting points for the heavy LSPs the M13 matrix
# regularly times out on (raise these only if your workspace
# actually needs the headroom — most users keep defaults):
#
#   jdtls     (java)  | type_hierarchy_*: 90s, find_references: 120s
#                     | format_document: 60s
#   metals    (scala) | workspace_symbols: 60s, inlay_hints: 60s
#                     | semantic_tokens: 60s, rename_preview: 90s
#   ruby-lsp  (ruby)  | goto_*: 60s, call_hierarchy_prepare: 60s
#   perl/PLS  (perl)  | find_references: 240s, rename_preview: 120s
#   gopls     (go)    | workspace_symbols: 90s on big-mod workspaces
#   rust-an.  (rust)  | format_document: 60s on monorepos with
#                     | non-trivial rustfmt configs
