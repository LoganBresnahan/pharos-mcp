name: release

# Tag-triggered v1.0+ release pipeline:
#   1. build     — one Ubuntu runner cross-builds all 5 platform
#                  binaries via Burrito + populates the per-platform
#                  npm sub-package bin/ dirs.
#   2. smoke     — matrix-tests each binary on its native runner
#                  (init handshake + tools/list + echo round-trip).
#   3. publish   — stamps version into all 6 package.jsons, copies
#                  LICENSE into each sub-package, publishes the 5
#                  platform packages then the main package, and
#                  creates a GitHub Release with the 5 raw binaries
#                  attached as direct-download assets.
#
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure the Trusted Publisher entry on npmjs.com for each of the
# six packages: org/user = LoganBresnahan, repo = pharos-mcp,
# workflow filename = release.yml.
#
# Provenance: auto-attached on public-repo npm publish via OIDC.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + smoke-test only; skip npm publish + GH Release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write      # create GH Release + upload assets
  id-token: write      # npm OIDC trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false      # never cancel a release mid-publish

jobs:
  # ---------- 1. BUILD ALL 5 BINARIES ----------
  build:
    name: Build all 5 platform binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Extract version from tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            # workflow_dispatch — use last tag for dry-run consistency
            v="$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0-dryrun")"
            v="${v#v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

      - name: Set up Erlang, Elixir, Gleam, and rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"
          gleam-version: "1.16.0"
          rebar3-version: "3.27.0"

      - name: Cache Mix + Gleam build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            build
          key: ${{ runner.os }}-otp28-elixir1.19-release-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp28-elixir1.19-release-

      - name: Install zig + xz (required by Burrito for cross-compile)
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils
          xz --version
        # Burrito invokes zig as a C cross-compiler. Use setup-zig action below.

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2  # pinned to match deps/burrito/lib/burrito.ex @zig_version_expected

      - name: Verify zig + xz on PATH
        run: |
          zig version
          xz --version | head -1

      - name: Install mix_gleam archive
        run: mix archive.install --force github LoganBresnahan/mix_gleam

      - name: Fetch dependencies
        run: mix deps.get

      - name: Build all 5 burrito targets
        env:
          MIX_ENV: prod
          PHAROS_RELEASE: "1"  # mix.exs: drops the `+<sha>` dev suffix from the
                               # compiled version, giving release builds a clean
                               # Burrito cache key distinct from any local dev build.
        run: mix release --overwrite

      - name: Verify all 5 binaries landed in npm/ sub-packages
        run: |
          set -e
          for entry in \
            "@pharos-mcp/linux-x64/bin/pharos" \
            "@pharos-mcp/linux-arm64/bin/pharos" \
            "@pharos-mcp/darwin-x64/bin/pharos" \
            "@pharos-mcp/darwin-arm64/bin/pharos" \
            "@pharos-mcp/win-x64/bin/pharos.exe"
          do
            path="npm/$entry"
            if [[ ! -f "$path" ]]; then
              echo "ERROR: $path is missing"
              exit 1
            fi
            size=$(stat -c %s "$path")
            echo "OK: $path ($((size/1024/1024)) MB)"
          done

      - name: Upload npm/ tree (skeletons + binaries)
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: npm/
          retention-days: 7

      - name: Upload raw burrito binaries (for GH Release direct download)
        uses: actions/upload-artifact@v4
        with:
          name: burrito-binaries
          path: burrito_out/pharos_*
          retention-days: 7

  # ---------- 2. SMOKE-TEST EACH PLATFORM NATIVELY ----------
  smoke:
    name: Smoke test ${{ matrix.target }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: linux-x64,     pkg: "@pharos-mcp/linux-x64",     bin: pharos }
          - { os: ubuntu-24.04-arm,  target: linux-arm64,   pkg: "@pharos-mcp/linux-arm64",   bin: pharos }
          - { os: macos-15-intel,    target: darwin-x64,    pkg: "@pharos-mcp/darwin-x64",    bin: pharos }
          - { os: macos-latest,      target: darwin-arm64,  pkg: "@pharos-mcp/darwin-arm64",  bin: pharos }
          - { os: windows-latest,    target: win-x64,       pkg: "@pharos-mcp/win-x64",       bin: pharos.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download npm/ tree
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: npm/

      - name: Run --version + --doctor (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "npm/${{ matrix.pkg }}/bin/${{ matrix.bin }}"
          "./npm/${{ matrix.pkg }}/bin/${{ matrix.bin }}" --version
          "./npm/${{ matrix.pkg }}/bin/${{ matrix.bin }}" --doctor

      - name: Run --version + --doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "npm\${{ matrix.pkg }}\bin\${{ matrix.bin }}" --version
          & "npm\${{ matrix.pkg }}\bin\${{ matrix.bin }}" --doctor

      - name: MCP init+tools/list+echo handshake (Unix)
        if: runner.os != 'Windows'
        run: |
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"echo","arguments":{"message":"smoke"}}}' \
            | "./npm/${{ matrix.pkg }}/bin/${{ matrix.bin }}")
          echo "$out"
          echo "$out" | grep -q '"protocolVersion":"2024-11-05"' || { echo "missing init response"; exit 1; }
          echo "$out" | grep -q '"name":"echo"' || { echo "missing tools/list echo"; exit 1; }
          echo "$out" | grep -q '"text":"smoke"' || { echo "missing echo result"; exit 1; }

  # ---------- 3. PUBLISH TO npm + GH RELEASE ----------
  publish:
    name: Publish ${{ needs.build.outputs.version }}
    needs: [build, smoke]
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download npm/ tree
        uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: npm/

      - name: Download raw burrito binaries
        uses: actions/download-artifact@v4
        with:
          name: burrito-binaries
          path: burrito_out/

      - name: Set up Node 22 + npm 11 (Trusted Publishing requires npm ≥11.5.1)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version supports OIDC
        run: |
          npm install -g npm@latest
          npm --version
          node --version

      - name: Stamp version into all 6 package.jsons
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -e
          for pkg in pharos-mcp "@pharos-mcp/linux-x64" "@pharos-mcp/linux-arm64" "@pharos-mcp/darwin-x64" "@pharos-mcp/darwin-arm64" "@pharos-mcp/win-x64"; do
            file="npm/$pkg/package.json"
            node -e "
              const fs = require('fs');
              const path = '$file';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '$VERSION';
              if (pkg.optionalDependencies) {
                for (const k of Object.keys(pkg.optionalDependencies)) {
                  pkg.optionalDependencies[k] = '$VERSION';
                }
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Stamped $file → $VERSION"
          done

      - name: Copy LICENSE into each sub-package
        run: |
          set -e
          for pkg in pharos-mcp "@pharos-mcp/linux-x64" "@pharos-mcp/linux-arm64" "@pharos-mcp/darwin-x64" "@pharos-mcp/darwin-arm64" "@pharos-mcp/win-x64"; do
            cp LICENSE "npm/$pkg/LICENSE"
          done

      - name: Resolve npm dist-tag (prerelease → next, otherwise latest)
        id: npm_tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
            echo "Prerelease version detected ($VERSION) → npm dist-tag = next"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable version ($VERSION) → npm dist-tag = latest"
          fi

      - name: Publish 5 platform packages (OIDC, with provenance)
        env:
          NPM_TAG: ${{ steps.npm_tag.outputs.tag }}
        run: |
          set -e
          for pkg in "@pharos-mcp/linux-x64" "@pharos-mcp/linux-arm64" "@pharos-mcp/darwin-x64" "@pharos-mcp/darwin-arm64" "@pharos-mcp/win-x64"; do
            echo "==> Publishing $pkg (tag=$NPM_TAG)"
            (cd "npm/$pkg" && npm publish --provenance --access public --tag "$NPM_TAG")
          done

      - name: Publish main pharos-mcp package
        env:
          NPM_TAG: ${{ steps.npm_tag.outputs.tag }}
        run: |
          cd npm/pharos-mcp
          npm publish --provenance --access public --tag "$NPM_TAG"

      - name: Create GitHub Release with raw binaries
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -e
          ls -la burrito_out/
          prerelease_flag=""
          if [[ "$VERSION" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $prerelease_flag \
            burrito_out/pharos_linux_x64 \
            burrito_out/pharos_linux_arm64 \
            burrito_out/pharos_darwin_x64 \
            burrito_out/pharos_darwin_arm64 \
            burrito_out/pharos_win_x64.exe
