name: ci

# Automatic triggers paused while pharos-mcp is a private repo —
# GitHub Actions on private repos bills against the account's
# free-tier minutes, and pre-release iteration would chew through
# them quickly. The workflow body is preserved so it runs as soon
# as the repo flips public (per release.md Stage C-2 — when we
# tag v1.0-rc1). Restore by replacing the `on:` block below with
# the commented form above:
#
# on:
#   push:
#     branches: [main]
#   pull_request:
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: build & test
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang, Elixir, Gleam, and rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"
          gleam-version: "1.16.0"
          rebar3-version: "3.27.0"

      - name: Cache Mix and Gleam build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            build
          key: ${{ runner.os }}-otp28-elixir1.19-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp28-elixir1.19-mix-

      - name: Install mix_gleam archive (LoganBresnahan/mix_gleam fork)
        run: mix archive.install --force github LoganBresnahan/mix_gleam

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix gleam.test

      - name: Smoke-test the stdio MCP server end-to-end
        run: |
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"echo","arguments":{"message":"smoke"}}}' \
            | mix start)
          echo "Server output:"
          echo "$out"
          echo "$out" | grep -q '"protocolVersion":"2024-11-05"' || { echo "missing initialize response"; exit 1; }
          echo "$out" | grep -q '"name":"echo"' || { echo "missing tools/list echo entry"; exit 1; }
          echo "$out" | grep -q '"text":"smoke"' || { echo "missing tools/call echo result"; exit 1; }
          # Notification line must produce no response — exactly 3 result lines.
          lines=$(echo "$out" | grep -c '^{"jsonrpc"')
          [ "$lines" = "3" ] || { echo "expected 3 response lines, got $lines"; exit 1; }
