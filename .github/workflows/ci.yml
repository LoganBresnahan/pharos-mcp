name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: build & test
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang, Elixir, Gleam, and rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1"
          elixir-version: "1.19.5"
          gleam-version: "1.17.0"
          rebar3-version: "3.27.0"

      - name: Cache Mix and Gleam build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            build
          key: ${{ runner.os }}-otp28-elixir1.19-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp28-elixir1.19-mix-

      - name: Install mix_gleam archive (LoganBresnahan/mix_gleam fork)
        run: mix archive.install --force github LoganBresnahan/mix_gleam

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Fossil guard — fail if v0.1-era hardcoded strings creep back in
        run: |
          # Guards against the specific fossil phrases removed in v0.1.1.
          # rust-analyzer, .rs, etc. appear legitimately throughout the
          # codebase (rust IS one of the wrapped LSPs); we only forbid the
          # known-bad phrases that were user-visible language assumptions.
          set -e
          fail=0
          fossil_grep() {
            local pattern="$1"
            local hint="$2"
            local hits
            hits=$(grep -rEn --include='*.gleam' --include='*.erl' --include='*.ex' \
                --exclude-dir=deps --exclude-dir=_build --exclude-dir=build \
                "$pattern" src/ lib/ 2>/dev/null || true)
            if [ -n "$hits" ]; then
              echo "::error::Forbidden fossil pattern '$pattern' — $hint"
              echo "$hits"
              fail=1
            fi
          }
          fossil_grep '"rust-analyzer failed'           'hardcoded server name in user-visible error message — use "LSP spawn failed:" instead'
          fossil_grep 'v0\.1 only'                      'version-gated capability claim — drop the v0.1 qualifier from user-visible strings'
          fossil_grep '"v0\.1 '                         'v0.1-era framing in a user-visible string literal — make it version-neutral'
          fossil_grep '\.rs files;'                     'hardcoded file-type message — use "unsupported file type:" instead'
          fossil_grep 'file:///home/user/project/src/main\.rs'  'specific rust example URI in a tool description — use file:///path/to/file'

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Fossil guard passed."

      - name: Run tests
        run: mix gleam.test

      - name: Smoke-test the stdio MCP server end-to-end
        run: |
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"echo","arguments":{"message":"smoke"}}}' \
            | mix start)
          echo "Server output:"
          echo "$out"
          echo "$out" | grep -q '"protocolVersion":"2024-11-05"' || { echo "missing initialize response"; exit 1; }
          echo "$out" | grep -q '"name":"echo"' || { echo "missing tools/list echo entry"; exit 1; }
          echo "$out" | grep -q '"text":"smoke"' || { echo "missing tools/call echo result"; exit 1; }
          # Notification line must produce no response — exactly 3 result lines.
          lines=$(echo "$out" | grep -c '^{"jsonrpc"')
          [ "$lines" = "3" ] || { echo "expected 3 response lines, got $lines"; exit 1; }
